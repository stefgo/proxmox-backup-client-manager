# Proxmox Backup Client Manager - Server Configuration

# Log level for the server (trace, debug, info, warn, error, fatal)
# Can be overridden by the LOG_LEVEL environment variable
logLevel: info

# OpenID Connect (OIDC) authentication settings
oidc:
    enabled: false
    issuer:
    client_id:
    client_secret:
    redirect_uri:

# Secret key used to sign and verify JSON Web Tokens (JWT) for user sessions
# This should be a long, random string
jwtSecret:

# General server settings
settings:
    # Number of days an invalid token remains in the database before being deleted
    retention_invalid_tokens_days: "0"
    # Ensure at least this many invalid tokens are always kept, overriding the days setting if needed
    retention_invalid_tokens_count: "0"
    # Number of days job history entries remain in the database before being deleted
    retention_job_history_days: "90"
    # Ensure at least this many job history entries are kept per client
    retention_job_history_count: "50"

# Security network settings
security:
    # List of CIDR subnets allowed to connect to the clients API endpoints. If empty, all are allowed.
    allowed_networks: []
    # List of CIDR subnets that are trusted and skip token validation for registration.
    trusted_networks: []
