strategy:
      matrix:
        # Wir definieren hier ein Mapping: 
        # 'id' ist das Kürzel für den Dateinamen, 'image_name' für das Package
        include:
          - id: client
            image_name: pbcm-client
          - id: server
            image_name: pbcm-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Greift auf docker/Dockerfile.client oder docker/Dockerfile.server zu
          file: ./docker/Dockerfile.${{ matrix.id }}
          push: true
          # Hier nutzen wir den neuen Namen 'pbcm-client' bzw. 'pbcm-server'
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}:${{ github.sha }}
