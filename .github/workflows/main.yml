name: Build Client and Server Images

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      # Die Matrix sorgt dafür, dass zwei Jobs parallel laufen
      matrix:
        component: [client, server]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Hier sagen wir Docker, wo die jeweilige Datei liegt
          context: .
          file: ./docker/Dockerfile.${{ matrix.component }}
          push: true
          # Das Image bekommt den Namen deines Repos + "-client" oder "-server"
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.component }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.component }}:${{ github.sha }}
