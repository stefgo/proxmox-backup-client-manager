<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E54D0D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7E47;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Rounded Rectangle (matching w-10 h-10 rounded-xl) -->
  <rect x="0" y="0" width="100" height="100" rx="25" ry="25" fill="url(#grad)" />

  <!-- Inner Icon (scaled and centered from 24x24 viewbox to fit 100x100) -->
  <!-- Original: stroke-width="2", 24px. Scale ~2.5x -> stroke ~5 -->
  <g transform="translate(20, 20) scale(2.5)" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
    <line x1="8" y1="21" x2="16" y2="21" />
    <line x1="12" y1="17" x2="12" y2="21" />
    <path d="M12 12v-4" />
    <path d="M12 12l2-2" />
    <path d="M12 12l-2-2" />
  </g>
</svg>
